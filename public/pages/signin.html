<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  </head>
  <body>
    <div class="container">
      <div class="signin-container">
        <h1>Hi, Welcome Back! <span>👋</span></h1>
        <form id="signin-form" action="/signin" method="POST">
          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com">
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Your Password" required>
            <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
          </div>
          <div class="options">
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-login">Login</button>
          <div class="divider">
            <span>Or With</span>
          </div>
          <button type="button" class="btn-social btn-facebook">Login with Facebook</button>
          <button type="button" class="btn-social btn-google">Login with Google</button>
          <p class="signup-link">Don't have an account? <a href="/signup">Sign Up</a></p>
        </form>
      </div>
    </div>
    <script src="/signin.js"></script>
  </body>
</html>
