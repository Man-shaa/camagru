<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password Form</title>
    <link rel="stylesheet" href="reset_password_request.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  </head>
  <body>
    <div class="container">
      <div class="reset-password-form-container">
        <h1>Set New Password</h1>
        <form id="reset-password-form" action="/reset_password_request" method="POST">
          <div class="input-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your new password" required>
            <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
          </div>

          <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your new password" required>
            <span class="password-toggle" id="toggleConfirmPassword"><i class="fas fa-eye"></i></span>
          </div>
          <button type="submit" class="btn-reset">Submit</button>
        </form>
      </div>
    </div>
    <script src="/reset_password_request.js"></script>
  </body>
</html>
