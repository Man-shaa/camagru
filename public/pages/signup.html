<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="signup.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
      <title>Sign Up</title>
  </head>
  <body>
      <div class="container">
          <h1>Create an account</h1>
          <p>Connect with your friends today!</p>
          <form id="signup-form" action="/signup" method="post">
              <div class="input-group">
                  <label for="username">Username</label>
                  <input type="text" id="username" name="username" placeholder="Enter Your Username" required>
              </div>
              <div class="input-group">
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" placeholder="Enter Your Email" required>
              </div>
              <div class="input-group">
                  <label for="password">Password</label>
                  <input type="password" id="password" name="password" placeholder="Enter Your Password" required>
                  <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
              </div>
              <button type="submit" class="btn-signup">Sign Up</button>
          </form>
          <div class="divider">Or With</div>
          <button class="btn-social btn-facebook">Signup with Facebook</button>
          <button class="btn-social btn-google">Signup with Google</button>
          <div class="login-link">
              <p>Already have an account ? <a href="/signin">Login</a></p>
          </div>
      </div>
      <script src="/signup.js"></script>
  </body>
</html>
